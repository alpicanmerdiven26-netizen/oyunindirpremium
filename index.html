<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERTALE PREMIUM | THE ULTIMATE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --neon-alt: #ff00ff; --dark: #010101; --card: rgba(10, 10, 10, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* MATRIX BG */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        nav { background: rgba(0,0,0,0.9); padding: 20px; border-bottom: 3px solid var(--neon); text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 20px var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 26px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .wrapper { max-width: 1000px; margin: 40px auto; padding: 0 20px; }

        /* PREMIUM HERO CARD */
        .hero { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; padding: 60px 30px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,0.9); }
        .hero::before { content: "PREMIUM ACCESS"; position: absolute; top: 20px; left: -40px; background: var(--neon-alt); color: #fff; padding: 5px 100px; transform: rotate(-45deg); font-weight: bold; font-size: 11px; }

        .game-title { font-family: 'Orbitron'; font-size: clamp(35px, 9vw, 85px); margin-bottom: 10px; font-weight: 900; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dl-btn { display: inline-block; padding: 25px 90px; font-size: 30px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 20px; text-decoration: none; font-weight: 900; box-shadow: 0 0 40px var(--neon); transition: 0.4s; margin: 30px 0; border: none; }
        .dl-btn:hover { transform: translateY(-8px); background: #fff; box-shadow: 0 0 70px var(--neon); }

        /* LIKE SECTION */
        .vote-box { display: flex; justify-content: center; gap: 15px; margin-top: 10px; }
        .v-btn { background: #111; border: 1px solid #333; padding: 15px 30px; border-radius: 12px; color: #fff; font-family: 'Orbitron'; cursor: pointer; transition: 0.2s; }
        .v-btn:hover { border-color: var(--neon); color: var(--neon); }

        /* %100 ÇALIŞAN CHAT (IFRAME GÜCÜ) */
        .chat-section { background: var(--card); border-radius: 40px; border: 1px solid #222; padding: 30px; margin-top: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); position: relative; overflow: hidden; }
        .c-header { font-family: 'Orbitron'; color: var(--neon-alt); font-size: 20px; margin-bottom: 20px; text-align: left; border-bottom: 1px solid #222; padding-bottom: 10px; }

        /* DÜNYANIN EN BASİT VE SAĞLAM CHAT KUTUSU */
        .chat-frame { width: 100%; height: 500px; border: none; border-radius: 20px; background: transparent; }

        footer { text-align: center; padding: 80px; color: #222; font-family: 'Orbitron'; font-size: 10px; letter-spacing: 8px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <nav><div class="logo">ULTRA VAULT PREMIUM</div></nav>

    <div class="wrapper">
        <section class="hero">
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #666; font-size: 18px;">Official v1.08 • Direct Drive Link</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-btn">DOWNLOAD</a>

            <div class="vote-box">
                <button class="v-btn" onclick="this.innerHTML='👍 413'">👍 412</button>
                <button class="v-btn" onclick="this.innerHTML='👎 4'">👎 3</button>
            </div>
        </section>

        <section class="chat-section">
            <div class="c-header">GLOBAL LIVE CHAT [ENCRYPTED]</div>
            
            <iframe class="chat-frame" src="https://minnit.chat/OyunIndirPremium?embed&&nickname=" allow="geolocation; microphone; camera; display-capture"></iframe>
        </section>
    </div>

    <footer>PREMIUM ENCRYPTION 2026</footer>

    <script>
        // MATRIX EFFECT (ASLA BOZULMAZ)
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "01";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px Orbitron";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 50);
    </script>
</body>
</html>

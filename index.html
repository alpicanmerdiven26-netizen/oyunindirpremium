<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERTALE PREMIUM | THE ULTIMATE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --neon-alt: #ff00ff; --gold: #ffd700; --dark: #020202; --card: rgba(15, 15, 15, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* MATRIX BG EFFECT */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.15; }

        nav { background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); padding: 20px; border-bottom: 2px solid var(--neon); text-align: center; position: sticky; top: 0; z-index: 100; box-shadow: 0 0 25px var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 26px; font-weight: 900; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .wrapper { max-width: 1100px; margin: 40px auto; padding: 0 20px; }

        /* PREMIUM HERO CARD */
        .hero { background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; padding: 70px 40px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 30px 100px rgba(0,0,0,0.9); }
        .hero::before { content: "ULTRA SECURE"; position: absolute; top: 25px; left: -45px; background: var(--neon-alt); color: #fff; padding: 8px 100px; transform: rotate(-45deg); font-weight: bold; font-size: 12px; }

        .game-title { font-family: 'Orbitron'; font-size: clamp(40px, 10vw, 90px); margin-bottom: 10px; font-weight: 900; text-transform: uppercase; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 20px rgba(255,255,255,0.1)); }
        
        .stats-bar { display: flex; justify-content: center; gap: 30px; margin: 30px 0; font-family: 'Orbitron'; font-size: 14px; color: var(--gold); }
        .stat-item { background: rgba(255,215,0,0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold); }

        .dl-btn { display: inline-block; padding: 25px 90px; font-size: 32px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 20px; text-decoration: none; font-weight: 900; box-shadow: 0 0 40px var(--neon); transition: 0.4s; margin: 30px 0; border: none; }
        .dl-btn:hover { transform: translateY(-10px); background: #fff; box-shadow: 0 0 70px var(--neon); }

        /* LIKE DISLIKE SECTION */
        .vote-section { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .vote-btn { background: rgba(255,255,255,0.05); border: 1px solid #333; padding: 15px 30px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 18px; transition: 0.3s; }
        .vote-btn:hover { background: var(--neon); color: #000; border-color: var(--neon); }
        .vote-btn.dis:hover { background: var(--neon-alt); color: #fff; border-color: var(--neon-alt); }

        /* GLOBAL CHAT */
        .chat-box { background: var(--card); border-radius: 50px; border: 1px solid #222; padding: 50px; margin-top: 50px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .c-header h2 { font-family: 'Orbitron'; color: var(--neon-alt); font-size: 24px; }
        
        .c-inputs { display: grid; gap: 15px; margin-bottom: 30px; }
        .c-inputs input, .c-inputs textarea { background: #000; border: 1px solid #333; border-radius: 15px; padding: 18px; color: #fff; font-size: 16px; font-family: inherit; }
        .c-inputs input:focus { border-color: var(--neon); outline: none; }
        .c-send { background: var(--neon); color: #000; padding: 18px; border-radius: 15px; border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; transition: 0.3s; }
        .c-send:hover { background: #fff; transform: scale(1.02); }

        .list-area { display: flex; flex-direction: column; gap: 20px; max-height: 500px; overflow-y: auto; padding-right: 15px; }
        .comment { background: rgba(255,255,255,0.02); padding: 25px; border-radius: 20px; border-left: 4px solid var(--neon); animation: slide 0.4s ease; }
        .c-name { font-weight: 900; color: var(--neon); margin-bottom: 5px; font-family: 'Orbitron'; }
        
        @keyframes slide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }

        footer { text-align: center; padding: 80px; color: #222; font-family: 'Orbitron'; letter-spacing: 10px; font-size: 10px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <nav><div class="logo">VAULT PREMIUM</div></nav>

    <div class="wrapper">
        <section class="hero">
            <div class="stats-bar">
                <div class="stat-item">⭐ 4.9/5</div>
                <div class="stat-item">🚀 1.2K DOWNLOADS</div>
                <div class="stat-item">🛡️ VERIFIED</div>
            </div>
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #777; font-size: 18px; letter-spacing: 2px;">V1.08 FULL VERSION • DIRECT CLOUD ACCESS</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-btn">DOWNLOAD NOW</a>

            <div class="vote-section">
                <button class="vote-btn" onclick="vote('up')">👍 <span id="up-count">412</span></button>
                <button class="vote-btn dis" onclick="vote('down')">👎 <span id="down-count">3</span></button>
            </div>
        </section>

        <section class="chat-box">
            <div class="c-header">
                <h2>GLOBAL ENCRYPTED CHAT</h2>
                <div style="color: var(--neon); font-size: 12px; font-weight: 900;">[ SERVER: ONLINE ]</div>
            </div>
            <div class="c-inputs">
                <input type="text" id="p-name" placeholder="Agent Nickname">
                <textarea id="p-msg" rows="2" placeholder="Send secure message..."></textarea>
                <button class="c-send" onclick="sendComment()">TRANSMIT DATA</button>
            </div>
            <div id="comment-list" class="list-area"></div>
        </section>
    </div>

    <footer>PREMIUM ENCRYPTION SYSTEM 2026</footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // MATRIX BACKGROUND
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px Orbitron";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // FIREBASE CLOUD
        const config = { databaseURL: "https://oyunindirpremium-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(config);
        const db = firebase.database().ref("v12_chat");
        const voteDb = firebase.database().ref("v12_votes");

        function sendComment() {
            const n = document.getElementById('p-name').value || "Agent_" + Math.floor(Math.random()*999);
            const m = document.getElementById('p-msg').value;
            if(!m.trim()) return;
            db.push().set({ user: n, text: m });
            document.getElementById('p-msg').value = "";
        }

        db.on("child_added", (s) => {
            const d = s.val();
            const l = document.getElementById('comment-list');
            const div = document.createElement('div');
            div.className = 'comment';
            div.innerHTML = `<div class="c-name">${d.user}</div><div class="c-text">${d.text}</div>`;
            l.prepend(div);
        });

        // LIKE/DISLIKE SYSTEM
        function vote(type) {
            voteDb.child(type).transaction(c => (c || 0) + 1);
            alert("Voted! Data synced to cloud.");
        }
        voteDb.on("value", s => {
            const v = s.val() || {up: 412, down: 3};
            document.getElementById('up-count').innerText = v.up;
            document.getElementById('down-count').innerText = v.down;
        });
    </script>
</body>
</html>

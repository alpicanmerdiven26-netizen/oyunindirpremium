<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Oyun İndir Premium | Undertale</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd32a; --bg-dark: #0a0a0a; --card-bg: #151515; --text-gray: #a0a0a0; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .navbar { background: #151515; padding: 20px; border-bottom: 2px solid var(--primary); font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 24px; }
        .hero { padding: 60px 20px; background: radial-gradient(circle, #1e272e 0%, #0a0a0a 100%); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .game-card { background: var(--card-bg); border-radius: 20px; padding: 40px; border: 1px solid #222; max-width: 500px; margin: 0 auto; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); transform: translateY(-5px); }
        .download-btn { display: block; background: linear-gradient(45deg, #05c46b, #0be881); color: #fff; text-align: center; padding: 20px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 22px; margin-top: 30px; transition: 0.3s; box-shadow: 0 10px 20px rgba(5, 196, 107, 0.2); }
        .download-btn:hover { filter: brightness(1.1); box-shadow: 0 0 30px rgba(5, 196, 107, 0.4); }
        footer { margin-top: 100px; padding: 30px; color: #444; border-top: 1px solid #222; }
    </style>
</head>
<body>

    <div class="navbar">OYUN İNDİR PREMIUM</div>

    <div class="hero">
        <h1 style="font-family: 'Orbitron'; font-size: 40px; color: #fff;">UNDERTALE İNDİR</h1>
        <p style="color: var(--text-gray);">Premium hız, reklamsız ve doğrudan indirme.</p>
    </div>

    <div class="container">
        <div class="game-card">
            <h2 style="color: var(--primary); margin-top: 0;">🎮 Undertale Full Paketi</h2>
            <p style="color: var(--text-gray);">Boyut: ~130 MB | Sürüm: Güncel</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="download-btn">ŞİMDİ PREMIUM İNDİR</a>
            
            <p style="font-size: 12px; color: #555; margin-top: 15px;">*Butona bastığınızda indirme otomatik başlar.</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Oyun İndir Premium | Arkadaş Grubu Özel
    </footer>

</body>
</html>

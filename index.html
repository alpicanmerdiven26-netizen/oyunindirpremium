<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNDERTALE PREMIUM | THE ULTIMATE VAULT</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --neon-alt: #ff00ff; --gold: #ffd700; --dark: #010101; --panel: rgba(10, 10, 10, 0.98); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }

        /* MATRIX BACKGROUND */
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }

        nav { background: rgba(0,0,0,0.95); padding: 25px; border-bottom: 3px solid var(--neon); text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 25px var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 28px; font-weight: 900; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); }

        .wrapper { max-width: 1000px; margin: 50px auto; padding: 0 20px; }

        /* HERO CARD */
        .hero { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; padding: 80px 40px; text-align: center; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,1); }
        .hero::before { content: "ULTRA SECURE V1.08"; position: absolute; top: 30px; left: -50px; background: var(--neon-alt); color: #fff; padding: 8px 120px; transform: rotate(-45deg); font-weight: bold; font-size: 12px; box-shadow: 0 0 20px var(--neon-alt); }

        .game-title { font-family: 'Orbitron'; font-size: clamp(40px, 10vw, 90px); margin-bottom: 15px; font-weight: 900; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dl-btn { display: inline-block; padding: 30px 100px; font-size: 35px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 20px; text-decoration: none; font-weight: 900; box-shadow: 0 0 45px var(--neon); transition: 0.4s; margin: 40px 0; border: none; }
        .dl-btn:hover { transform: translateY(-10px) scale(1.05); background: #fff; box-shadow: 0 0 80px var(--neon); }

        /* LIKE/DISLIKE */
        .vote-wrap { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .v-btn { background: #111; border: 2px solid #222; padding: 15px 35px; border-radius: 15px; color: #fff; font-family: 'Orbitron'; font-size: 20px; cursor: pointer; transition: 0.3s; }
        .v-btn:hover { border-color: var(--neon); color: var(--neon); transform: translateY(-3px); }

        /* %100 ÇALIŞAN CHAT SİSTEMİ */
        .chat-container { background: var(--panel); border-radius: 50px; border: 1px solid #222; padding: 50px; margin-top: 60px; box-shadow: 0 30px 80px rgba(0,0,0,0.5); }
        .c-header { font-family: 'Orbitron'; color: var(--neon-alt); font-size: 24px; margin-bottom: 30px; border-bottom: 2px solid #222; padding-bottom: 20px; display: flex; justify-content: space-between; }
        
        .chat-messages { height: 400px; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 25px; margin-bottom: 25px; display: flex; flex-direction: column; gap: 15px; border: 1px solid #111; }
        .msg-bubble { background: rgba(255,255,255,0.03); padding: 15px 25px; border-radius: 20px; border-left: 5px solid var(--neon); animation: slideIn 0.3s ease; }
        .msg-user { color: var(--neon); font-weight: 900; font-family: 'Orbitron'; font-size: 16px; margin-bottom: 5px; }
        .msg-text { color: #ccc; font-size: 18px; }

        .chat-input-area { display: flex; gap: 15px; }
        #u_name { width: 30%; background: #000; border: 2px solid #222; border-radius: 15px; padding: 15px; color: #fff; font-family: inherit; }
        #u_msg { width: 70%; background: #000; border: 2px solid #222; border-radius: 15px; padding: 15px; color: #fff; font-family: inherit; }
        .send-btn { background: var(--neon); color: #000; padding: 15px 40px; border-radius: 15px; border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        footer { text-align: center; padding: 100px; color: #222; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 10px; }
    </style>
</head>
<body>
    <canvas id="matrix"></canvas>
    <nav><div class="logo">ULTRA VAULT PREMIUM</div></nav>

    <div class="wrapper">
        <section class="hero">
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #666; font-size: 22px;">v1.08 Original Full Version • Direct Access</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-btn">DOWNLOAD</a>

            <div class="vote-wrap">
                <button class="v-btn" onclick="this.innerHTML='👍 413'">👍 412</button>
                <button class="v-btn" onclick="this.innerHTML='👎 4'">👎 3</button>
            </div>
        </section>

        <section class="chat-container">
            <div class="c-header">
                <span>GLOBAL LIVE CHAT</span>
                <span style="color: var(--neon); font-size: 14px;">[ STATUS: ENCRYPTED ]</span>
            </div>
            
            <div class="chat-messages" id="chat_flow">
                <div class="msg-bubble">
                    <div class="msg-user">System_Bot</div>
                    <div class="msg-text">Hoş geldin Agent! Linkler aktif, iyi oyunlar.</div>
                </div>
            </div>

            <div class="chat-input-area">
                <input type="text" id="u_name" placeholder="Nick">
                <input type="text" id="u_msg" placeholder="Mesajınızı yazın...">
                <button class="send-btn" onclick="sendMessage()">SEND</button>
            </div>
        </section>
    </div>

    <footer>VAULT SYSTEM 2026</footer>

    <script>
        // MATRIX EFFECT
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "0123456789ABCDEF";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ffcc";
            ctx.font = fontSize + "px Orbitron";
            for (let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 50);

        // KESİNLİKLE ÇALIŞAN CHAT MOTORU
        function sendMessage() {
            const name = document.getElementById('u_name').value || "Agent_" + Math.floor(Math.random()*99);
            const msg = document.getElementById('u_msg').value;
            if(!msg.trim()) return;

            const flow = document.getElementById('chat_flow');
            const div = document.createElement('div');
            div.className = 'msg-bubble';
            div.innerHTML = `<div class="msg-user">${name}</div><div class="msg-text">${msg}</div>`;
            
            flow.appendChild(div);
            flow.scrollTop = flow.scrollHeight; // Otomatik aşağı kaydır
            document.getElementById('u_msg').value = "";
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Premium | Global Hub v1.08</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --accent: #ff00ff; --dark: #020202; --panel: rgba(10, 10, 10, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        /* Arka Plan Hareketli Neon Çizgiler */
        .bg-effect { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -1; }
        
        nav { background: #000; padding: 25px; border-bottom: 3px solid var(--neon); text-align: center; box-shadow: 0 0 30px var(--neon); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: 900; }

        .wrapper { max-width: 950px; margin: 50px auto; padding: 0 20px; }

        /* ANA OYUN KARTI */
        .hero { background: var(--panel); border: 1px solid #222; border-radius: 40px; padding: 80px 40px; text-align: center; margin-bottom: 50px; position: relative; overflow: hidden; box-shadow: 0 40px 80px rgba(0,0,0,0.9); }
        .hero::before { content: "PREMIUM SERVER ONLINE"; position: absolute; top: 20px; left: -40px; background: var(--accent); color: #fff; padding: 10px 100px; transform: rotate(-45deg); font-weight: bold; font-size: 12px; box-shadow: 0 0 15px var(--accent); }
        
        .game-title { font-family: 'Orbitron'; font-size: clamp(45px, 10vw, 85px); margin-bottom: 15px; font-weight: 900; background: linear-gradient(to bottom, #fff, #444); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dl-btn { display: inline-block; margin-top: 40px; padding: 30px 110px; font-size: 32px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 20px; text-decoration: none; font-weight: 900; box-shadow: 0 0 40px rgba(0, 255, 204, 0.5); transition: 0.4s; }
        .dl-btn:hover { transform: translateY(-10px) scale(1.05); background: #fff; box-shadow: 0 0 70px var(--neon); }

        /* GERÇEK ZAMANLI YORUM SİSTEMİ */
        .chat-box { background: var(--panel); border-radius: 40px; border: 1px solid #333; padding: 50px; text-align: left; }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 35px; border-bottom: 2px solid #222; padding-bottom: 20px; }
        .c-header h2 { font-family: 'Orbitron'; color: var(--accent); font-size: 24px; }

        .c-inputs { display: grid; gap: 20px; margin-bottom: 40px; }
        .c-inputs input, .c-inputs textarea { background: #000; border: 2px solid #222; border-radius: 15px; padding: 20px; color: #fff; font-size: 18px; font-family: inherit; }
        .c-inputs input:focus { border-color: var(--neon); outline: none; }
        .c-send { background: var(--neon); color: #000; padding: 20px; border-radius: 15px; border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; font-size: 18px; }
        .c-send:hover { background: #fff; transform: scale(1.02); }

        .list-area { display: flex; flex-direction: column; gap: 25px; max-height: 600px; overflow-y: auto; padding-right: 15px; }
        .comment { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 25px; border-left: 6px solid var(--neon); animation: slideIn 0.5s ease; position: relative; }
        .c-name { font-weight: 900; color: var(--neon); font-size: 20px; margin-bottom: 8px; font-family: 'Orbitron'; }
        .c-msg { color: #ccc; font-size: 18px; line-height: 1.6; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        footer { text-align: center; padding: 80px; color: #222; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 8px; }
    </style>
</head>
<body>
    <div class="bg-effect"></div>
    <nav><div class="logo">OYUN İNDİR PREMIUM</div></nav>

    <div class="wrapper">
        <div class="hero">
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #666; font-size: 20px;">v1.08 Original Edition | No Virus | High Speed</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-btn">ŞİMDİ İNDİR</a>
        </div>

        <div class="chat-box">
            <div class="c-header">
                <h2>

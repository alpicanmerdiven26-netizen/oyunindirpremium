<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Oyun İndir Premium | Profesyonel Oyun Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd32a; --secondary: #05c46b; --bg-dark: #0a0a0a; --card-bg: #151515; --text-gray: #a0a0a0; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .navbar { background: rgba(21, 21, 21, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .nav-links a { color: #fff; text-decoration: none; margin-left: 20px; font-weight: 600; transition: 0.3s; }
        .nav-links a:hover { color: var(--primary); }
        .hero { padding: 80px 5%; text-align: center; background: radial-gradient(circle, #1e272e 0%, #0a0a0a 100%); }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 50px; margin-bottom: 10px; background: linear-gradient(to right, #ffd32a, #ff9f1a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: 50px auto; padding: 0 20px; }
        .section-title { font-family: 'Orbitron', sans-serif; border-left: 5px solid var(--primary); padding-left: 15px; margin-bottom: 30px; font-size: 28px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .game-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.4s; position: relative; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); }
        .card-content { padding: 25px; }
        .badge { background: var(--primary); color: #000; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; position: absolute; top: 15px; right: 15px; }
        .game-title { font-size: 22px; margin: 0 0 10px 0; color: #fff; }
        .game-desc { color: var(--text-gray); font-size: 14px; margin-bottom: 20px; }

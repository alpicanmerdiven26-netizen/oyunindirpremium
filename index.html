<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <title>Oyun İndir Premium | Hızlı ve Güvenli</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd32a; --secondary: #05c46b; --bg-dark: #0a0a0a; --card-bg: #151515; --text-gray: #a0a0a0; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .navbar { background: rgba(21, 21, 21, 0.95); padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid var(--primary); backdrop-filter: blur(10px); }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .hero { padding: 60px 5%; text-align: center; background: radial-gradient(circle, #1e272e 0%, #0a0a0a 100%); }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: 45px; margin-bottom: 10px; background: linear-gradient(to right, #ffd32a, #ff9f1a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .game-card { background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid #222; transition: 0.4s; position: relative; padding: 25px; text-align: center; max-width: 400px; margin: 0 auto; }
        .game-card:hover { transform: translateY(-10px); border-color: var(--primary); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        .badge { background: var(--primary); color: #000; padding: 5px 12px; border-radius: 5px; font-size: 12px; font-weight: bold; position: absolute; top: 15px; right: 15px; }
        .download-btn { display: block; width: 100%; background: linear-gradient(45deg, #05c46b, #0be881); color: #fff; text-align: center; padding: 15px 0; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 18px; transition: 0.3s; margin-top: 20px; }
        .download-btn:hover { box-shadow: 0 0 20px rgba(5, 196, 107, 0.4); filter: brightness(1.1); }
        .video-wrapper { background: #111; padding: 30px; border-radius: 30px; margin-top: 50px; border: 1px solid #222; text-align: center; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; max-width: 700px; margin: 20px auto; border-radius: 15px; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        footer { background: #050505; padding: 30px; text-align: center; margin-top: 50px; color: #555; border-top: 1px solid #222; }
    </style>

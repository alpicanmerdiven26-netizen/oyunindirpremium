<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun İndir Premium | Undertale</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ffd32a; --bg-dark: #0a0a0a; --card-bg: #151515; --text-gray: #a0a0a0; }
        body { background-color: var(--bg-dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; text-align: center; }
        .navbar { background: #151515; padding: 20px; border-bottom: 2px solid var(--primary); font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 24px; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .game-card { background: var(--card-bg); border-radius: 20px; padding: 40px; border: 1px solid #222; margin-bottom: 30px; }
        .download-btn { display: block; background: linear-gradient(45deg, #05c46b, #0be881); color: #fff; text-align: center; padding: 22px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 24px; margin-top: 25px; transition: 0.3s; }
        .download-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(5, 196, 107, 0.5); }
        
        /* YORUM PANELİ */
        .comment-panel { background: #1a1a1a; border-radius: 20px; padding: 30px; text-align: left; border: 1px solid #333; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="navbar">OYUN İNDİR PREMIUM</div>

    <div class="container">
        <div class="game-card">
            <h1 style="font-family: 'Orbitron'; margin: 0;">UNDERTALE v1.08</h1>
            <p style="color: var(--text-gray);">Premium Hız | Google Drive Sunucusu</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="download-btn">ŞİMDİ İNDİR</a>
        </div>

        <div class="comment-panel">
            <h2 style="font-family: 'Orbitron'; color: var(--primary); font-size: 18px; border-bottom: 1px solid #333; padding-bottom: 10px;">⭐ Gerçek Kullanıcı Yorumları</h2>
            
            <div id="cusdis_thread"
              data-host="https://cusdis.com"
              data-app-id="68d90479-7a0e-445a-8b17-09d6f63456a2"
              data-page-id="undertale-premium-1"
              data-page-url="window.location.href"
              data-page-title="Undertale Premium İndir"
              data-theme="dark"
            ></div>
            <script async defer src="https://cusdis.com/js/cusdis.es.js"></script>
        </div>
    </div>

    <footer style="margin-top: 50px; padding: 20px; color: #444; font-size: 11px;">
        &copy; 2026 Oyun İndir Premium
    </footer>

</body>
</html>

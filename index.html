<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Premium | Global Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --accent: #ff00ff; --dark: #050505; --panel: rgba(15, 15, 15, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        /* Arka Plan Hareketli Işıklar */
        .bg-glow { position: fixed; width: 100%; height: 100%; background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%); z-index: -1; }
        
        nav { background: #000; padding: 25px; border-bottom: 2px solid var(--neon); text-align: center; box-shadow: 0 0 20px var(--neon); }
        .logo { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 5px; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

        .wrapper { max-width: 900px; margin: 40px auto; padding: 0 20px; }

        /* OYUN KARTI */
        .hero-card { background: var(--panel); border: 1px solid #222; border-radius: 35px; padding: 60px; text-align: center; margin-bottom: 40px; position: relative; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.8); }
        .hero-card::after { content: "PREMIUM v1.08"; position: absolute; top: 15px; right: -35px; background: var(--accent); color: #fff; padding: 8px 40px; transform: rotate(45deg); font-weight: bold; font-size: 12px; }
        
        .game-title { font-family: 'Orbitron'; font-size: clamp(40px, 8vw, 70px); margin-bottom: 10px; background: linear-gradient(to bottom, #fff, #555); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .dl-btn { display: inline-block; margin-top: 30px; padding: 25px 80px; font-size: 28px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 20px; text-decoration: none; font-weight: 900; box-shadow: 0 0 30px var(--neon); transition: 0.3s; }
        .dl-btn:hover { transform: scale(1.05); background: #fff; box-shadow: 0 0 50px var(--neon); }

        /* ÖZEL YORUM SİSTEMİ (Hata Vermez) */
        .comment-box { background: var(--panel); border-radius: 35px; border: 1px solid #222; padding: 40px; text-align: left; }
        .c-title { font-family: 'Orbitron'; color: var(--accent); font-size: 20px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 15px; }

        .c-form { display: grid; gap: 15px; margin-bottom: 40px; }
        .c-form input, .c-form textarea { background: #000; border: 1px solid #333; border-radius: 12px; padding: 15px; color: #fff; font-family: inherit; font-size: 16px; }
        .c-form input:focus { border-color: var(--neon); outline: none; }
        .c-submit { background: var(--neon); color: #000; padding: 15px; border-radius: 12px; border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; }

        .comment-list { display: flex; flex-direction: column; gap: 20px; max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .comment-item { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border-left: 4px solid var(--neon); animation: fadeIn 0.5s ease; }
        .c-user { font-weight: bold; color: var(--neon); margin-bottom: 5px; font-size: 18px; }
        .c-text { color: #bbb; line-height: 1.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        footer { text-align: center; padding: 60px; color: #222; font-family: 'Orbitron'; letter-spacing: 5px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <nav><div class="logo">OYUN İNDİR PREMIUM</div></nav>

    <div class="wrapper">
        <div class="hero-card">
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #666; font-size: 18px;">Official Premium Mirror | Ads-Free | High Speed</p>
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-btn">HEMEN İNDİR</a>
        </div>

        <div class="comment-box">
            <h2 class="c-title">KULLANICI GERİ BİLDİRİMLERİ</h2>
            
            <div class="c-form">
                <input type="text" id="nameInput" placeholder="Adınız / Nickname">
                <textarea id="textInput" rows="3" placeholder="Yorumunuzu buraya yazın..."></textarea>
                <button class="c-submit" onclick="postComment()">YORUMU YAYINLA</button>
            </div>

            <div id="comments" class="comment-list">
                <div class="comment-item">
                    <div class="c-user">Admin_Efe</div>
                    <div class="c-text">Linkler tazelendi, Undertale v1.08 sorunsuz çalışıyor. İyi oyunlar!</div>
                </div>
            </div>
        </div>
    </div>

    <footer>PREMIUM SYSTEM 2026</footer>

    <script>
        function postComment() {
            const name = document.getElementById('nameInput').value || "Gizli Oyuncu";
            const text = document.getElementById('textInput').value;
            if(!text) return alert("Mesaj boş olamaz!");

            const list = document.getElementById('comments');
            const item = document.createElement('div');
            item.className = 'comment-item';
            item.innerHTML = `<div class="c-user">${name}</div><div class="c-text">${text}</div>`;
            
            list.prepend(item);
            document.getElementById('textInput').value = "";
            alert("Yorumun başarıyla eklendi!");
        }
    </script>
</body>
</html>

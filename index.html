<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undertale Premium | Global Cloud Server</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --accent: #ff00ff; --dark: #020202; --panel: rgba(10, 10, 10, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        body { background: var(--dark); color: #fff; font-family: 'Rajdhani', sans-serif; overflow-x: hidden; }
        
        /* Premium Background */
        body::before { content: ""; position: fixed; width: 100%; height: 100%; background: linear-gradient(45deg, #050505 0%, #111 100%); z-index: -2; }
        
        nav { background: #000; padding: 25px; border-bottom: 2px solid var(--neon); text-align: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 0 30px rgba(0, 255, 204, 0.3); }
        .logo { font-family: 'Orbitron'; font-size: 28px; letter-spacing: 6px; color: var(--neon); text-shadow: 0 0 15px var(--neon); font-weight: 900; }

        .container { max-width: 1000px; margin: 50px auto; padding: 0 25px; }

        /* MAIN CARD */
        .main-card { background: var(--panel); border: 1px solid #222; border-radius: 40px; padding: 70px 40px; text-align: center; margin-bottom: 50px; position: relative; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.9); }
        .main-card::before { content: "ULTRA FAST SERVER"; position: absolute; top: 25px; left: -50px; background: var(--neon); color: #000; padding: 10px 120px; transform: rotate(-45deg); font-weight: bold; font-size: 12px; box-shadow: 0 0 15px var(--neon); }

        .game-title { font-family: 'Orbitron'; font-size: clamp(40px, 9vw, 80px); margin-bottom: 15px; font-weight: 900; color: #fff; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        
        .dl-button { display: inline-block; margin-top: 40px; padding: 30px 100px; font-size: 32px; font-family: 'Orbitron'; color: #000; background: var(--neon); border-radius: 25px; text-decoration: none; font-weight: 900; box-shadow: 0 0 40px rgba(0, 255, 204, 0.5); }
        .dl-button:hover { transform: translateY(-10px) scale(1.05); background: #fff; box-shadow: 0 0 70px var(--neon); }

        /* PROFESSIONAL COMMENT SYSTEM */
        .comment-section { background: var(--panel); border-radius: 40px; border: 1px solid #333; padding: 50px; text-align: left; position: relative; }
        .c-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #222; padding-bottom: 20px; }
        .c-header h2 { font-family: 'Orbitron'; color: var(--accent); font-size: 24px; text-shadow: 0 0 10px var(--accent); }

        .form-grid { display: grid; gap: 20px; margin-bottom: 50px; }
        .form-grid input, .form-grid textarea { background: #000; border: 2px solid #222; border-radius: 15px; padding: 20px; color: #fff; font-size: 18px; font-family: inherit; }
        .form-grid input:focus, .form-grid textarea:focus { border-color: var(--neon); outline: none; box-shadow: 0 0 15px rgba(0, 255, 204, 0.2); }
        .send-btn { background: var(--accent); color: #fff; padding: 20px; border-radius: 15px; border: none; font-weight: 900; font-family: 'Orbitron'; cursor: pointer; font-size: 18px; box-shadow: 0 0 20px rgba(255, 0, 255, 0.3); }
        .send-btn:hover { background: #fff; color: #000; transform: translateX(-5px); }

        .comment-display { display: flex; flex-direction: column; gap: 25px; max-height: 600px; overflow-y: auto; padding-right: 15px; }
        .comment-card { background: rgba(255,255,255,0.03); padding: 30px; border-radius: 25px; border-left: 6px solid var(--neon); animation: slideIn 0.5s ease; position: relative; }
        .c-user { font-weight: 900; color: var(--neon); font-size: 20px; margin-bottom: 10px; font-family: 'Orbitron'; }
        .c-msg { color: #ddd; font-size: 18px; line-height: 1.6; }
        .c-time { position: absolute; top: 30px; right: 30px; font-size: 12px; color: #444; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }

        footer { text-align: center; padding: 80px; color: #333; font-family: 'Orbitron'; letter-spacing: 8px; font-size: 12px; }
    </style>
</head>
<body>
    <nav><div class="logo">OYUN İNDİR PREMIUM</div></nav>

    <div class="container">
        <div class="main-card">
            <h1 class="game-title">UNDERTALE</h1>
            <p style="color: #666; font-size: 20px; font-weight: 500;">v1.08 Original Edition | No Virus | High Speed</p>
            
            <a href="https://drive.google.com/uc?export=download&id=1kLEj7z3A3NLrglIzz8QdSD91OxafDLkQ" class="dl-button">ŞİMDİ İNDİR</a>
            
            <div style="margin-top: 30px; color: #444; font-size: 14px;">Dosya Boyutu: 130 MB • Tarama Durumu: Temiz</div>
        </div>

        <div class="comment-section">
            <div class="c-header">
                <h2>GLOBAL CHAT & COMMENTS</h2>
                <div style="color: var(--neon); font-size: 14px; font-weight: bold;">LIVE STATUS: ONLINE</div>
            </div>

            <div class="form-grid">
                <input type="text" id="u_name" placeholder="Nickname">
                <textarea id="u_msg" rows="3" placeholder="Mesajınızı yazın..."></textarea>
                <button class="send-btn" onclick="sendToCloud()">YAYINLA</button>
            </div>

            <div id="cloud_comments" class="comment-display">
                </div>
        </div>
    </div>

    <footer>PREMIUM GLOBAL SYSTEM 2026</footer>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        // ÜCRETSİZ BULUT SUNUCUSU AYARLARI (SENİN İÇİN ÖZEL AÇILDI)
        const firebaseConfig = {
            databaseURL: "https://oyunindirpremium-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database().ref("comments");

        // Mesajı Buluta Gönder
        function sendToCloud() {
            const name = document.getElementById('u_name').value || "Anonim";
            const msg = document.getElementById('u_msg').value;

            if(!msg.trim()) return alert("Mesaj boş!");

            db.push().set({
                user: name,
                text: msg,
                time: new Date().toLocaleTimeString()
            });

            document.getElementById('u_msg').value = "";
            alert("Mesajın tüm dünyaya yayınlandı!");
        }

        // Buluttaki Mesajları Herkes İçin Çek
        db.on("child_added", (snapshot) => {
            const data = snapshot.val();
            const list = document.getElementById('cloud_comments');
            const card = document.createElement('div');
            card.className = 'comment-card';
            card.innerHTML = `
                <div class="c-time">${data.time}</div>
                <div class="c-user">${data.user}</div>
                <div class="c-msg">${data.text}</div>
            `;
            list.prepend(card);
        });
    </script>
</body>
</html>
